<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Claim Search</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }

        h2 {
            margin-bottom: 5px;
        }

        #searchBox {
            width: 300px;
            padding: 8px;
            font-size: 14px;
        }

        button {
            padding: 8px 14px;
            margin-left: 5px;
            cursor: pointer;
        }

        #results {
            margin-top: 20px;
            padding: 10px;
            background: #f4f4f4;
            border-radius: 6px;
            white-space: pre-wrap;
        }

        .error {
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h2>Claim Search</h2>
    <p>
        Enter any keyword to search claims.  
        Wildcards are automatically supported (e.g., typing <b>auto</b> will match <i>automobile</i>, <i>auto‑theft</i>, etc.).
    </p>

    <!-- Search Input -->
    <input id="searchBox" type="text" placeholder="Search claims..." />
    <button onclick="runSearch()">Search</button>

    <!-- Results Container -->
    <div id="results"></div>

    <script>
        /**
         * Executes a wildcard-enabled search against the Claims API.
         * Displays formatted JSON results or an error message.
         */
        async function runSearch() {
            const query = document.getElementById("searchBox").value.trim();
            const resultsDiv = document.getElementById("results");

            if (!query) {
                resultsDiv.innerHTML = "<span class='error'>Please enter a search term.</span>";
                return;
            }

            try {
                const response = await fetch(`/api/Claims/search?query=${encodeURIComponent(query)}`);

                if (!response.ok) {
                    resultsDiv.innerHTML = "<span class='error'>Search failed. Please try again.</span>";
                    return;
                }

                const data = await response.json();

                // Display formatted JSON
                resultsDiv.innerHTML = "<pre>" + JSON.stringify(data, null, 2) + "</pre>";

            } catch (error) {
                resultsDiv.innerHTML = "<span class='error'>Unable to connect to server.</span>";
            }
        }
    </script>

</body>
</html>
