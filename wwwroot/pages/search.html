<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Claims - Adjuster Workload Optimizer</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .card { max-width: 700px; margin: auto; margin-top: 60px; border-radius: 12px; }
        .results-table { margin-top: 25px; }
    </style>
</head>
<body>

<div class="card shadow p-4">
    <h3 class="text-center mb-3">Search Claims</h3>
    <p class="text-muted text-center">Use wildcards (e.g., *123*) to broaden your search.</p>

    <!-- SEARCH INPUT -->
    <div class="mb-3">
        <label class="form-label">Search Term</label>
        <input id="searchInput" type="text" class="form-control" placeholder="Enter claim number, type, or keyword">
    </div>

    <button class="btn btn-primary w-100" onclick="performSearch()">Search</button>

    <!-- RESULTS -->
    <div id="results" class="results-table"></div>
</div>

<script>
async function performSearch() {
    const term = document.getElementById("searchInput").value.trim();
    if (!term) return;

    const response = await fetch(`/api/claims/search/${term}`);
    const data = await response.json();

    let html = `
        <table class="table table-bordered table-striped mt-4">
            <thead>
                <tr>
                    <th>Claim ID</th>
                    <th>Claim Number</th>
                    <th>Type</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
    `;

    data.forEach(c => {
        html += `
            <tr>
                <td>${c.claimId}</td>
                <td>${c.claimNumber}</td>
                <td>${c.claimType}</td>
                <td>${c.status}</td>
            </tr>
        `;
    });

    html += "</tbody></table>";
    document.getElementById("results").innerHTML = html;
}
</script>

</body>
</html>
