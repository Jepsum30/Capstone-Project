<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Change Password - Adjuster Workload Optimizer</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .card { max-width: 450px; margin: auto; margin-top: 60px; border-radius: 12px; }
        .error { color: red; font-weight: bold; }
    </style>
</head>
<body>

<div class="card shadow p-4">
    <h3 class="text-center mb-3">Change Password</h3>
    <p class="text-muted text-center">
        Password must include uppercase, lowercase, number, and symbol.
    </p>

    <div id="message"></div>

    <div class="mb-3">
        <label class="form-label">User ID</label>
        <input id="userId" class="form-control" type="number">
    </div>

    <div class="mb-3">
        <label class="form-label">New Password</label>
        <input id="newPassword" class="form-control" type="password">
    </div>

    <button class="btn btn-primary w-100" onclick="changePassword()">Update Password</button>
</div>

<script>
async function changePassword() {
    const payload = {
        userId: document.getElementById("userId").value,
        newPassword: document.getElementById("newPassword").value
    };

    const response = await fetch("/api/users/change-password", {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
    });

    const msg = document.getElementById("message");

    if (response.ok) {
        msg.innerHTML = `<p class="text-success">Password updated successfully!</p>`;
    } else {
        msg.innerHTML = `<p class="error">Password update failed.</p>`;
    }
}
</script>

</body>
</html>
