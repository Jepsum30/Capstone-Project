<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Change Password - Adjuster Workload Optimizer</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .card {
            max-width: 450px;
            margin: auto;
            margin-top: 60px;
            border-radius: 12px;
        }

        .error {
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>

<!-- ========================================================= -->
<!-- CHANGE PASSWORD FORM CARD -->
<!-- ========================================================= -->
<div class="card shadow p-4">

    <h3 class="text-center mb-3">Change Password</h3>

    <p class="text-muted text-center">
        Password must include uppercase, lowercase, number, and symbol.
    </p>

    <!-- SUCCESS / ERROR MESSAGE AREA -->
    <div id="message"></div>

    <!-- User ID Input -->
    <div class="mb-3">
        <label class="form-label">User ID</label>
        <input id="userId" type="number" class="form-control" placeholder="Enter your User ID" />
    </div>

    <!-- New Password Input -->
    <div class="mb-3">
        <label class="form-label">New Password</label>
        <input id="newPassword" type="password" class="form-control" placeholder="Enter new password" />
    </div>

    <!-- Change Password Button -->
    <button class="btn btn-primary w-100" onclick="changePassword()">
        Update Password
    </button>

    <!-- Back to Dashboard -->
    <button class="btn btn-secondary w-100 mt-2"
            onclick="location.href='dashboard.html'">
        Back to Dashboard
    </button>
</div>

<!-- ========================================================= -->
<!-- PASSWORD CHANGE SCRIPT -->
<!-- ========================================================= -->
<script>
    /**
     * Sends a password update request to the API.
     * Displays success or error messages on the page.
     */
    async function changePassword() {
        const userId = document.getElementById("userId").value.trim();
        const newPassword = document.getElementById("newPassword").value.trim();
        const messageDiv = document.getElementById("message");

        // Basic client-side validation
        if (!userId || !newPassword) {
            messageDiv.innerHTML = "<p class='error'>All fields are required.</p>";
            return;
        }

        try {
            const response = await fetch(`/api/Users/change-password/${userId}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(newPassword)
            });

            const result = await response.text();

            if (!response.ok) {
                messageDiv.innerHTML = `<p class='error'>${result}</p>`;
                return;
            }

            // Success message
            messageDiv.innerHTML =
                `<p class='text-success fw-bold'>Password updated successfully!</p>`;

        } catch (error) {
            messageDiv.innerHTML =
                "<p class='error'>Unable to connect to server.</p>";
        }
    }
</script>

</body>
</html>
