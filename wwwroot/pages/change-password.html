        body { background-color: #f8f9fa; }
        .card { max-width: 450px; margin: 60px auto; border-radius: 12px; }
        .error { color: red; font-weight: bold; }
    </style>
</head>

<body>

<!-- GLOBAL NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="dashboard.html">Adjuster Optimizer</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">

                <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="claims.html">Claims</a></li>

<!-- PAGE CONTENT -->
<div class="card shadow p-4">

    <h3 class="text-center mb-3">Change Password</h3>

    <p class="text-muted text-center">
        Password must include uppercase, lowercase, number, and symbol.
    </p>

    <div id="message"></div>

    <div class="mb-3">
        <label class="form-label">User ID</label>
        <input id="userId" type="number" class="form-control" placeholder="Enter your User ID" />
    </div>

    <div class="mb-3">
        <label class="form-label">New Password</label>
        <input id="newPassword" type="password" class="form-control" placeholder="Enter new password" />
    </div>

    <button class="btn btn-primary w-100" onclick="changePassword()">Update Password</button>

</div>

<script>
    const API_BASE = "http://localhost:5196";

    async function changePassword() {
        const userId = document.getElementById("userId").value.trim();
        const newPassword = document.getElementById("newPassword").value.trim();
        const messageDiv = document.getElementById("message");

        if (!userId || !newPassword) {
            messageDiv.innerHTML = "<p class='error'>All fields are required.</p>";
            return;
        }

        try {
            const response = await fetch(`${API_BASE}/api/Users/change-password/${userId}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(newPassword)
            });

            const result = await response.text();

            if (!response.ok) {
                messageDiv.innerHTML = `<p class='error'>${result}</p>`;
                return;
            }

            messageDiv.innerHTML =
                `<p class='text-success fw-bold'>Password updated successfully!</p>`;

        } catch (error) {
            messageDiv.innerHTML =
                "<p class='error'>Unable to connect to server.</p>";
        }
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
