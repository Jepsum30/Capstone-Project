<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - Adjuster Workload Optimizer</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body>

<!-- NAVIGATION BAR -->
<!-- This stays at the top and links to all other pages -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">

        <!-- App Name -->
        <a class="navbar-brand">Adjuster Optimizer</a>

        <!-- Navigation Buttons -->
        <!-- These link to the other pages you created -->
        <div>
            <a href="claims.html" class="btn btn-outline-light me-2">Claims</a>
            <a href="adjusters.html" class="btn btn-outline-light me-2">Adjusters</a>
            <a href="assignments.html" class="btn btn-outline-light me-2">Assignments</a>
            <a href="performance.html" class="btn btn-outline-light">Performance</a>
        </div>
    </div>
</nav>

<!-- MAIN DASHBOARD CONTENT -->
<div class="container mt-4">

    <!-- Page Title -->
    <h2>Dashboard Overview</h2>

    <!-- Dashboard Cards -->
    <!-- These are placeholders for Week 1 -->
    <!-- Later they will show real data from your database -->
    <div class="row mt-4">

        <div class="col-md-4">
            <div class="card p-3 shadow-sm">
                <h4>Incoming Claims</h4>
                <p>Displays all new claims awaiting assignment.</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3 shadow-sm">
                <h4>Adjuster Workload</h4>
                <p>Shows current load for each adjuster.</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3 shadow-sm">
                <h4>Recent Assignments</h4>
                <p>Tracks the latest claim assignments.</p>
            </div>
        </div>

    </div>
</div>

</body>
</html>
