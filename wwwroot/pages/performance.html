<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Performance History - Adjuster Workload Optimizer</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .card { max-width: 900px; margin: auto; margin-top: 60px; border-radius: 12px; }
    </style>
</head>
<body>

<div class="card shadow p-4">
    <h3 class="text-center mb-3">Performance History</h3>
    <p class="text-muted text-center">View adjuster performance metrics and historical scoring.</p>

    <button class="btn btn-primary w-100" onclick="loadPerformance()">Load Performance Records</button>

    <div id="records" class="mt-4"></div>
</div>

<script>
async function loadPerformance() {
    const response = await fetch("/api/PerformanceHistory");
    const data = await response.json();

    let html = `
        <table class="table table-bordered table-striped">
            <thead>
                <tr>
                    <th>Record ID</th>
                    <th>Adjuster ID</th>
                    <th>Score</th>
                    <th>Date Recorded</th>
                </tr>
            </thead>
            <tbody>
    `;

    data.forEach(r => {
        html += `
            <tr>
                <td>${r.recordId}</td>
                <td>${r.adjusterId}</td>
                <td>${r.performanceScore}</td>
                <td>${r.recordedOn}</td>
            </tr>
        `;
    });

    html += "</tbody></table>";
    document.getElementById("records").innerHTML = html;
}
</script>

</body>
</html>
