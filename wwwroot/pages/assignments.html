<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Assignments - Adjuster Workload Optimizer</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        body {
            background-color: #f8f9fa;
        }
        .card {
            border-radius: 10px;
        }
        .error {
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark p-2">
    <a href="dashboard.html" class="btn btn-outline-light">Back to Dashboard</a>
</nav>

<div class="container mt-4">

    <h2>Assignment History</h2>
    <p class="text-muted">
        This page displays all claim-to-adjuster assignments using live API data.
    </p>

    <p id="errorMessage" class="error"></p>

    <div class="card p-3 shadow-sm mt-3">
        <h4 class="mb-3">Recent Assignments</h4>

        <table class="table table-bordered table-striped table-hover">
            <thead class="table-dark">
                <tr>
                    <th>Assignment ID</th>
                    <th>Claim ID</th>
                    <th>Adjuster</th>
                    <th>Date Assigned</th>
                </tr>
            </thead>
            <tbody id="assignmentTableBody">
                <!-- Filled by JavaScript -->
            </tbody>
        </table>
    </div>
</div>

<script>
    const API_BASE = "http://localhost:5196/api/Assignments";

    async function loadAssignments() {
        const tableBody = document.getElementById("assignmentTableBody");
        const errorMessage = document.getElementById("errorMessage");

        try {
            const response = await fetch(API_BASE);

            if (!response.ok) {
                throw new Error("API returned status " + response.status);
            }

            const assignments = await response.json();
            tableBody.innerHTML = "";

            assignments.forEach(a => {
                const row = document.createElement("tr");

                const adjusterName = a.adjuster
                    ? `${a.adjuster.firstName} ${a.adjuster.lastName}`
                    : "Unknown";

                const dateAssigned = a.assignmentDate
                    ? new Date(a.assignmentDate).toLocaleDateString()
                    : "N/A";

                row.innerHTML = `
                    <td>${a.assignmentId}</td>
                    <td>${a.claimId}</td>
                    <td>${adjusterName}</td>
                    <td>${dateAssigned}</td>
                `;

                tableBody.appendChild(row);
            });

        } catch (err) {
            errorMessage.textContent = "Failed to load assignments.";
            console.error("Error loading assignments:", err);
        }
    }

    loadAssignments();
</script>

</body>
</html>
