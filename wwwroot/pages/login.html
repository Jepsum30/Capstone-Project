<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Login - Adjuster Workload Optimizer</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .card {
            max-width: 420px;
            margin: auto;
            margin-top: 80px;
            border-radius: 12px;
        }

        .error {
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>

<!-- ========================================================= -->
<!-- LOGIN FORM CARD -->
<!-- ========================================================= -->
<div class="card shadow p-4">

    <h3 class="text-center mb-3">User Login</h3>

    <p class="text-muted text-center">
        Enter your username and password to access the system.
    </p>

    <!-- SUCCESS / ERROR MESSAGE AREA -->
    <div id="message"></div>

    <!-- Username Input -->
    <div class="mb-3">
        <label class="form-label">Username</label>
        <input id="username" class="form-control" placeholder="Enter username" />
    </div>

    <!-- Password Input -->
    <div class="mb-3">
        <label class="form-label">Password</label>
        <input id="password" type="password" class="form-control" placeholder="Enter password" />
    </div>

    <!-- Login Button -->
    <button class="btn btn-primary w-100" onclick="loginUser()">
        Login
    </button>

    <!-- Register Button -->
    <button class="btn btn-secondary w-100 mt-2"
            onclick="location.href='register.html'">
        Create an Account
    </button>

    <!-- Back to Dashboard -->
    <button class="btn btn-outline-dark w-100 mt-2"
            onclick="location.href='dashboard.html'">
        Back to Dashboard
    </button>
</div>

<!-- ========================================================= -->
<!-- LOGIN SCRIPT -->
<!-- ========================================================= -->
<script>
    /**
     * Sends login data to the API.
     * Displays success or error messages on the page.
     * NOTE: The login API endpoint will be implemented in Week 3.
     */
    async function loginUser() {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();
        const messageDiv = document.getElementById("message");

        // Basic client-side validation
        if (!username || !password) {
            messageDiv.innerHTML = "<p class='error'>Both fields are required.</p>";
            return;
        }

        // Build request body
        const body = {
            username: username,
            password: password
        };

        try {
            // Placeholder API call (real login endpoint added in Week 3)
            const response = await fetch("/api/Users/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(body)
            });

            const result = await response.text();

            if (!response.ok) {
                messageDiv.innerHTML = `<p class='error'>${result}</p>`;
                return;
            }

            // Success message
            messageDiv.innerHTML =
                `<p class='text-success fw-bold'>Login successful!</p>`;

            // Redirect to dashboard (placeholder)
            setTimeout(() => {
                location.href = "dashboard.html";
            }, 1000);

        } catch (error) {
            messageDiv.innerHTML =
                "<p class='error'>Unable to connect to server.</p>";
        }
    }
</script>

</body>
</html>
