<!DOCTYPE html>
<html>
<head>
    <title>Login - Adjuster Workload Optimizer</title>

    <!-- Bootstrap CSS for easy styling -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

<!-- MAIN LOGIN CONTAINER -->
<!-- This centers the login box on the screen -->
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">

            <!-- Page Title -->
            <h3 class="text-center mb-4">User Login</h3>

            <!-- LOGIN FORM (front-end only for Week 1) -->
            <!-- Later this will POST to your .NET API -->
            <form>

                <!-- USERNAME FIELD -->
                <!-- Replace with real database validation in Week 3 -->
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-control" placeholder="Enter username">
                </div>

                <!-- PASSWORD FIELD -->
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" placeholder="Enter password">
                </div>

                <!-- LOGIN BUTTON -->
                <!-- For Week 1, this simply redirects to dashboard.html -->
                <button class="btn btn-primary w-100"
                        onclick="window.location='dashboard.html'; return false;">
                    Login
                </button>

            </form>
        </div>
    </div>
</div>

</body>
</html>
